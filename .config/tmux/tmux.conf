# performence improvements
set -sg escape-time 0     # recognize key sequence without delay
set -g focus-events on    # generate focus events when terminal gains or loses focus

# set true color
# set -g default-terminal "tmux-256color"

set -sg terminal-overrides ",*:RGB"

# current working alternative works on all terminals
set -g default-terminal "${TERM}"

# undercurl support (on ghostty its not needed)
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
# underscore colours - needs tmux-3.0
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# https://github.com/3rd/image.nvim/?tab=readme-ov-file#tmux
# this is needed by the image.nvim plugin
set -gq allow-passthrough on
# this is related to the `tmux_show_only_in_active_window = true,` config in
# image.nvim
set -g visual-activity off

# enable mouse support
set -g mouse on

# start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-option -g renumber-windows on

# set prefix
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# vim style pane begin-selection
bind -n C-M-h select-pane -L
bind -n C-M-j select-pane -D
bind -n C-M-k select-pane -U
bind -n C-M-l select-pane -R

# shift alt to switch windows
bind -n M-H previous-window
bind -n M-L next-window

# list of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin "janoamaral/tokyo-night-tmux"

# set tpm plugin plugins folder path acording to XDG
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins'

# configure tmux-resurrect
set -g @resurrect-strategy-nvim 'session'

# configure tokyo-night tmux statusline
set -g @tokyo-night-tmux_window_id_style none
set -g @tokyo-night-tmux_pane_id_style hide

set -g @tokyo-night-tmux_show_git 0
set -g @tokyo-night-tmux_show_battery_widget 1
set -g @tokyo-night-tmux_battery_name "BAT0"
set -g @tokyo-night-tmux_date_format DMY

# set vi-mode
set-window-option -g mode-keys vi

# keybindings
# refresh config
bind u source-file ~/.config/tmux/tmux.conf \; display-message "config reloaded"
# toggle statusline
bind-key b set-option status
# clear screen
bind l send-keys "clear" Enter

# wl-clipboard
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy"
bind-key ] run-shell "wl-paste | tmux load-buffer - && tmux paste-buffer"

#  splits and new windows
bind c new-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"

# needed by image.nvim plugin
set -gq allow-passthrough on
set -g visual-activity off


# init TMUX plugin manager (keep this as last line!)
run '~/.config/tmux/plugins/tpm/tpm'
